name: Regenerate Catalog

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate-catalog:
    name: Regenerate catalog and index
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate catalog and index
        run: python tools/generate-catalog.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet CATALOG.md skills_index.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CATALOG.md skills_index.json
          git commit -m "chore: regenerate catalog [skip ci]"
          git push
